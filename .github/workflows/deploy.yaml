name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm

      - name: install typst
        run: |
          curl -L https://github.com/typst/typst/releases/download/v0.14.2/typst-x86_64-unknown-linux-musl.tar.xz -o typst.tar.xz
          tar -xf typst.tar.xz
          mv typst-x86_64-unknown-linux-musl "$HOME/.typst"
          rm -f typst.tar.xz
          echo "$HOME/.typst" >> "$GITHUB_PATH"

      - name: install mmdr
        run: |
          curl -L https://github.com/1jehuang/mermaid-rs-renderer/releases/download/v0.2.1/mmdr-x86_64-unknown-linux-gnu.tar.gz -o mmdr.tar.gz
          tar -xzf mmdr.tar.gz
          mkdir -p "$HOME/.local/bin"
          mv mmdr "$HOME/.local/bin/mmdr"
          chmod +x "$HOME/.local/bin/mmdr"
          rm -f mmdr.tar.gz
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - run: pnpm install --frozen-lockfile

      - name: write site config overrides
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          python3 -c "
          import json, os
          overrides = {
            'comments': {
              'enabled': True,
              'server': os.environ['ARTALK_SERVER'],
              'site': os.environ['ARTALK_SITE']
            },
            'site': {
              'url': 'https://timfang4162.github.io/astro-theme-vellume',
              'attribution': f'Powered by <a href=\"https://astro.build\" target=\"_blank\" class=\"text-muted-foreground transition-colors hover:text-primary\">Astro</a> &amp; Theme <a href=\"https://github.com/TimFang4162/astro-theme-vellume\" target=\"_blank\" class=\"text-muted-foreground transition-colors hover:text-primary\">Vellume</a><br>Commit <a href=\"https://github.com/TimFang4162/astro-theme-vellume/commit/{os.environ[\"GITHUB_SHA\"]}\" target=\"_blank\" class=\"text-muted-foreground transition-colors hover:text-primary\">{os.environ[\"SHORT_SHA\"]}</a>'
            }
          }
          with open(os.environ['GITHUB_ENV'], 'a') as f:
            f.write(f'SITE_CONFIG_OVERRIDES={json.dumps(overrides)}\n')
          "
        env:
          ARTALK_SERVER: ${{ secrets.ARTALK_SERVER }}
          ARTALK_SITE: ${{ secrets.ARTALK_SITE }}
          GITHUB_SHA: ${{ github.sha }}
          SHORT_SHA: ${{ github.sha }}

      - run: pnpm build
        env:
          SITE_BASE: /astro-theme-vellume

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v6
      - id: deployment
        uses: actions/deploy-pages@v5
