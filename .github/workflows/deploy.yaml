name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm

      - name: install typst
        run: |
          curl -L https://github.com/typst/typst/releases/download/v0.14.2/typst-x86_64-unknown-linux-musl.tar.xz -o typst.tar.xz
          tar -xf typst.tar.xz
          mv typst-x86_64-unknown-linux-musl "$HOME/.typst"
          rm -f typst.tar.xz
          echo "$HOME/.typst" >> "$GITHUB_PATH"

      - name: install mmdr
        run: |
          curl -L https://github.com/1jehuang/mermaid-rs-renderer/releases/download/v0.2.1/mmdr-x86_64-unknown-linux-gnu.tar.gz -o mmdr.tar.gz
          tar -xzf mmdr.tar.gz
          mkdir -p "$HOME/.local/bin"
          mv mmdr "$HOME/.local/bin/mmdr"
          chmod +x "$HOME/.local/bin/mmdr"
          rm -f mmdr.tar.gz
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - run: pnpm install --frozen-lockfile

      - name: build attribution with commit hash
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          ATTRIBUTION="Powered by <a href=\"https://astro.build\" target=\"_blank\" class=\"text-muted-foreground transition-colors hover:text-primary\">Astro</a> & Theme <a href=\"https://github.com/TimFang4162/astro-theme-vellume\" target=\"_blank\" class=\"text-muted-foreground transition-colors hover:text-primary\">Vellume</a><br>Commit <a href=\"https://github.com/TimFang4162/astro-theme-vellume/commit/${GITHUB_SHA}\" target=\"_blank\" class=\"text-muted-foreground transition-colors hover:text-primary\">${SHORT_SHA}</a>"
          echo "ATTRIBUTION=${ATTRIBUTION}" >> "$GITHUB_ENV"

      - run: pnpm build
        env:
          SITE_CONFIG_OVERRIDES: >-
            {"comments":{"enabled":true,"server":"${{ secrets.ARTALK_SERVER }}","site":"${{ secrets.ARTALK_SITE }}"},"site":{"attribution":"${{ env.ATTRIBUTION }}"}}

      - name: deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          publish_dir: ./dist
          external_repository: TimFang4162/timfang4162.github.io
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
